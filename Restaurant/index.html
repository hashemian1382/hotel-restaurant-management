<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم مدیریت رستوران</title>
    <link href="./output.css" rel="stylesheet">
    <script src="./lucide.js"></script>
    <style>
        @font-face {
            font-family: 'Vazirmatn';
         }
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f3f4f6; }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="text-gray-800">

    <div id="login-view" class="min-h-screen flex items-center justify-center bg-gray-900">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96">
            <div class="flex justify-center mb-6 text-indigo-600">
                <i data-lucide="utensils-crossed" class="w-16 h-16"></i>
            </div>
            <h1 class="text-2xl font-bold text-center mb-8">ورود به سامانه رستوران</h1>
            <div class="space-y-4">
                <button onclick="app.login('admin')" class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                    <i data-lucide="shield"></i> مدیریت
                </button>
                <button onclick="app.login('waiter')" class="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center justify-center gap-2">
                    <i data-lucide="coffee"></i> گارسون
                </button>
                <button onclick="app.login('kitchen')" class="w-full py-3 bg-orange-600 text-white rounded-lg hover:bg-orange-700 flex items-center justify-center gap-2">
                    <i data-lucide="chef-hat"></i> آشپزخانه
                </button>
                <button onclick="app.login('cashier')" class="w-full py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 flex items-center justify-center gap-2">
                    <i data-lucide="calculator"></i> صندوق
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-layout" class="hidden-view min-h-screen flex flex-col">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10 relative">
            <div class="flex items-center gap-3">
                <i data-lucide="utensils" class="text-indigo-600"></i>
                <h2 id="header-title" class="text-xl font-bold">داشبورد</h2>
            </div>
            <button onclick="app.logout()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg flex gap-2 items-center">
                <i data-lucide="log-out"></i> خروج
            </button>
        </header>

        <main class="flex-1 p-6 overflow-auto">
            
            <section id="admin-view" class="hidden-view space-y-6">
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                        <div class="text-gray-500 mb-1">فروش امروز</div>
                        <div id="admin-total-sales" class="text-3xl font-bold text-gray-800">0 تومان</div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold">مدیریت منو</h3>
                        <div class="flex gap-2">
                            <button onclick="admin.exportMenu()" class="bg-gray-100 text-gray-700 px-3 py-2 rounded-lg flex gap-2 hover:bg-gray-200">
                                <i data-lucide="download" class="w-5 h-5"></i> خروجی (Backup)
                            </button>
                            
                            <input type="file" id="import-menu-file" class="hidden" accept=".json" onchange="admin.importMenu(event)">
                            <button onclick="document.getElementById('import-menu-file').click()" class="bg-gray-100 text-gray-700 px-3 py-2 rounded-lg flex gap-2 hover:bg-gray-200">
                                <i data-lucide="upload" class="w-5 h-5"></i> ورود (Restore)
                            </button>

                            <button onclick="admin.openMenuModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg flex gap-2">
                                <i data-lucide="plus" class="w-5 h-5"></i> افزودن غذا
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-right">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-3">نام</th>
                                    <th class="p-3">دسته‌بندی</th>
                                    <th class="p-3">قیمت (تومان)</th>
                                    <th class="p-3">وضعیت</th>
                                    <th class="p-3">عملیات</th>
                                </tr>
                            </thead>
                            <tbody id="admin-menu-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="waiter-view" class="hidden-view space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h3 class="text-lg font-bold mb-4">غذاهای آماده تحویل</h3>
                    <div id="waiter-ready-list" class="flex flex-col gap-3"></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <div class="flex gap-4 mb-6 text-sm">
                        <span class="flex items-center gap-1"><div class="w-4 h-4 bg-green-100 border border-green-500 rounded"></div> خالی</span>
                        <span class="flex items-center gap-1"><div class="w-4 h-4 bg-red-100 border border-red-500 rounded"></div> مشغول</span>
                        <span class="flex items-center gap-1"><div class="w-4 h-4 bg-yellow-100 border border-yellow-500 rounded"></div> منتظر تسویه</span>
                    </div>
                    <div id="waiter-tables-grid" class="grid grid-cols-5 md:grid-cols-10 gap-4"></div>
                </div>
            </section>

            <section id="kitchen-view" class="hidden-view">
                <h3 class="text-xl font-bold mb-6">صف پخت</h3>
                <div id="kitchen-orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section id="cashier-view" class="hidden-view space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm lg:col-span-1">
                        <h3 class="text-lg font-bold mb-4">میزهای فعال</h3>
                        <div id="cashier-tables-list" class="space-y-2"></div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm lg:col-span-2">
                        <h3 class="text-lg font-bold mb-4">فاکتور</h3>
                        <div id="cashier-invoice-details">
                            <p class="text-gray-400 text-center py-10">یک میز را انتخاب کنید</p>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <div id="modal-overlay" class="hidden-view fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl w-auto max-w-[95vw] max-h-[95vh] flex flex-col m-auto">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-lg"></h3>
                <button onclick="app.closeModal()" class="text-gray-500 hover:text-red-500"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-4 overflow-y-auto flex-1 custom-scrollbar"></div>
            <div id="modal-footer" class="p-4 border-t bg-gray-50 rounded-b-xl flex justify-end gap-3"></div>
        </div>
    </div>

    <script src="./js/store.js"></script>
    <script src="./js/admin.js"></script>
    <script src="./js/waiter.js"></script>
    <script src="./js/kitchen.js"></script>
    <script src="./js/cashier.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
